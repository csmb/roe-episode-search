<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SF Map — Roll Over Easy</title>
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			background: #f5f5f0;
			color: #1a1a1a;
			height: 100vh;
			display: flex;
			flex-direction: column;
		}

		header {
			padding: 12px 20px;
			background: #fff;
			border-bottom: 1px solid #e0e0d8;
			display: flex;
			align-items: center;
			gap: 16px;
			flex-shrink: 0;
		}

		header a {
			color: #555;
			text-decoration: none;
			font-size: 13px;
		}

		header a:hover { color: #1a1a1a; }

		header h1 {
			font-size: 16px;
			font-weight: 600;
			flex: 1;
		}

		header .subtitle {
			font-size: 13px;
			color: #777;
		}

		#map {
			flex: 1;
		}

		.leaflet-popup-content-wrapper {
			border-radius: 6px;
			box-shadow: 0 2px 12px rgba(0,0,0,0.15);
		}

		.place-popup h3 {
			font-size: 14px;
			font-weight: 600;
			margin-bottom: 6px;
		}

		.place-popup .count {
			font-size: 12px;
			color: #777;
			margin-bottom: 8px;
		}

		.place-popup ul {
			list-style: none;
			max-height: 180px;
			overflow-y: auto;
		}

		.place-popup ul li {
			font-size: 12px;
			padding: 3px 0;
			border-bottom: 1px solid #f0f0f0;
		}

		.place-popup ul li:last-child { border-bottom: none; }

		.place-popup ul li a {
			color: #2563eb;
			text-decoration: none;
		}

		.place-popup ul li a:hover { text-decoration: underline; }

		.place-popup ul li .ep-date {
			color: #999;
			font-size: 11px;
			margin-left: 4px;
		}

		#loading {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background: #fff;
			padding: 16px 24px;
			border-radius: 8px;
			box-shadow: 0 2px 12px rgba(0,0,0,0.15);
			z-index: 1000;
			font-size: 14px;
			color: #555;
		}
	</style>
</head>
<body>
	<header>
		<a href="/episodes">Episodes</a>
		<span style="color:#ccc">·</span>
		<a href="/map">Map</a>
		<span style="color:#ccc">·</span>
		<a href="/">Search</a>
		<h1>San Francisco Places</h1>
		<span class="subtitle" id="place-count">Loading…</span>
	</header>
	<div id="map"></div>
	<div id="loading">Loading places…</div>

	<script>
		const map = L.map('map').setView([37.7749, -122.4194], 13);

		L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
			attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
			maxZoom: 19,
		}).addTo(map);

		function episodeDate(episodeId) {
			const m = episodeId.match(/(\d{4}-\d{2}-\d{2})/);
			return m ? m[1] : '';
		}

		function circleRadius(count, maxCount) {
			// Scale between 6px and 28px
			const minR = 6, maxR = 28;
			return minR + (maxR - minR) * Math.sqrt(count / maxCount);
		}

		async function loadPlaces() {
			const res = await fetch('/api/map-places');
			const data = await res.json();
			const places = data.places;

			document.getElementById('loading').remove();
			document.getElementById('place-count').textContent =
				`${places.length} places · ${data.total_mentions} episode mentions`;

			if (places.length === 0) return;

			const maxCount = Math.max(...places.map(p => p.episode_count));

			for (const place of places) {
				const radius = circleRadius(place.episode_count, maxCount);
				const circle = L.circleMarker([place.lat, place.lng], {
					radius,
					fillColor: '#e85d04',
					fillOpacity: 0.65,
					color: '#c44d02',
					weight: 1.5,
				}).addTo(map);

				const episodeItems = place.episodes
					.sort((a, b) => b.id.localeCompare(a.id))
					.map(ep => {
						const date = episodeDate(ep.id);
						const title = ep.title || date;
						return `<li><a href="/?episode=${encodeURIComponent(ep.id)}" target="_blank">${title}</a><span class="ep-date">${date}</span></li>`;
					}).join('');

				const plural = place.episode_count === 1 ? 'episode' : 'episodes';
				circle.bindPopup(`
					<div class="place-popup">
						<h3>${place.name}</h3>
						<div class="count">Mentioned in ${place.episode_count} ${plural}</div>
						<ul>${episodeItems}</ul>
					</div>
				`, { maxWidth: 280 });
			}
		}

		loadPlaces().catch(err => {
			document.getElementById('loading').textContent = 'Failed to load places.';
			console.error(err);
		});
	</script>
</body>
</html>
