<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Map - Roll Over Easy</title>
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			background: #f5f5f5;
			color: #2c2c2c;
			height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.hero {
			position: relative;
			background: linear-gradient(135deg, #808080 0%, #a0a0a0 50%, #606060 100%);
			color: #fff;
			text-align: center;
			padding: 1.25rem 2rem;
			flex-shrink: 0;
		}
		.hero-image {
			width: 100%; height: 100%; object-fit: cover;
			position: absolute; top: 0; left: 0; opacity: 0.3;
		}
		.hero-content { position: relative; z-index: 1; }
		.hero h1 {
			font-size: 2rem;
			font-weight: 700;
			letter-spacing: -0.5px;
			text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
			margin-bottom: 0.25rem;
		}
		.hero h1 a { color: inherit; text-decoration: none; }
		.hero h1 a:hover { opacity: 0.85; }
		.hero .tagline {
			font-size: 1.05rem;
			font-weight: 300;
			font-style: italic;
			opacity: 0.9;
			margin-bottom: 0.5rem;
			text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
		}
		.hero nav a {
			color: rgba(255,255,255,0.85);
			text-decoration: none;
			font-size: 0.9rem;
			transition: color 0.2s ease;
		}
		.hero nav a:hover { color: #fff; }
		.hero nav a[aria-current="page"] { color: #fff; border-bottom: 2px solid #FF4F00; padding-bottom: 2px; }
		:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

		@media (max-width: 768px) {
			.hero { padding: 1rem 1.5rem; }
			.hero h1 { font-size: 1.6rem; }
		}

		#map {
			flex: 1;
		}

		.leaflet-popup-content-wrapper {
			border-radius: 6px;
			box-shadow: 0 2px 12px rgba(0,0,0,0.15);
		}

		.place-popup h3 {
			font-size: 14px;
			font-weight: 600;
			margin-bottom: 6px;
		}

		.place-popup .count {
			font-size: 12px;
			color: #777;
			margin-bottom: 8px;
		}

		.place-popup ul {
			list-style: none;
			max-height: 180px;
			overflow-y: auto;
		}

		.place-popup ul li {
			font-size: 12px;
			padding: 3px 0;
			border-bottom: 1px solid #f0f0f0;
		}

		.place-popup ul li:last-child { border-bottom: none; }

		.place-popup ul li a {
			color: #2563eb;
			text-decoration: none;
		}

		.place-popup ul li a:hover { text-decoration: underline; }

		.place-popup ul li .ep-date {
			color: #999;
			font-size: 11px;
			margin-left: 4px;
		}

		#loading {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background: #fff;
			padding: 16px 24px;
			border-radius: 8px;
			box-shadow: 0 2px 12px rgba(0,0,0,0.15);
			z-index: 1000;
			font-size: 14px;
			color: #555;
		}
	</style>
</head>
<body>
	<div class="hero">
		<img class="hero-image" src="https://akiaiq6swxkqiixrwd6qcomhaystacksoftwarearq-us-west-1.s3.us-west-1.amazonaws.com/ferry_building.png" alt="" role="presentation">
		<div class="hero-content">
			<h1><a href="/">Roll Over Easy</a></h1>
			<div class="tagline">SF Places Map · <span id="place-count">Loading…</span></div>
			<nav aria-label="Main navigation"><a href="/episodes">Episodes</a> · <a href="/map" aria-current="page">Map</a> · <a href="/">Search</a></nav>
		</div>
	</div>
	<div id="map"></div>
	<div id="loading">Loading places…</div>

	<script>
		function escapeHtml(str) {
			return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
		}

		const map = L.map('map').setView([37.7749, -122.4194], 13);

		L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
			attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
			maxZoom: 20,
		}).addTo(map);

		function episodeDate(episodeId) {
			const m = episodeId.match(/(\d{4}-\d{2}-\d{2})/);
			return m ? m[1] : '';
		}

		function circleRadius(count, maxCount) {
			// Scale between 6px and 28px
			const minR = 6, maxR = 28;
			return minR + (maxR - minR) * Math.sqrt(count / maxCount);
		}

		async function loadPlaces() {
			const res = await fetch('/api/map-places');
			const data = await res.json();
			const places = data.places;

			document.getElementById('loading').remove();
			document.getElementById('place-count').textContent =
				`${places.length} places · ${data.total_mentions} episode mentions`;

			if (places.length === 0) return;

			const maxCount = Math.max(...places.map(p => p.episode_count));

			for (const place of places) {
				const radius = circleRadius(place.episode_count, maxCount);
				const circle = L.circleMarker([place.lat, place.lng], {
					radius,
					fillColor: '#e85d04',
					fillOpacity: 0.45,
					color: '#c44d02',
					weight: 1.5,
				}).addTo(map);

				const episodeItems = place.episodes
					.sort((a, b) => b.id.localeCompare(a.id))
					.map(ep => {
						const date = episodeDate(ep.id);
						const title = escapeHtml(ep.title || date);
						return `<li><a href="/?episode=${encodeURIComponent(ep.id)}" target="_blank">${title}</a><span class="ep-date">${escapeHtml(date)}</span></li>`;
					}).join('');

				const plural = place.episode_count === 1 ? 'episode' : 'episodes';
				circle.bindPopup(`
					<div class="place-popup">
						<h3>${escapeHtml(place.name)}</h3>
						<div class="count">Mentioned in ${place.episode_count} ${plural}</div>
						<ul>${episodeItems}</ul>
					</div>
				`, { maxWidth: 280 });

				// Desktop: show popup on hover; mobile keeps default click behavior
				const hasHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
				if (hasHover) {
					let closeTimer = null;
					circle.on('mouseover', () => {
						clearTimeout(closeTimer);
						circle.openPopup();
					});
					circle.on('mouseout', () => {
						closeTimer = setTimeout(() => circle.closePopup(), 300);
					});
					circle.on('popupopen', () => {
						const el = circle.getPopup().getElement();
						if (el) {
							el.addEventListener('mouseenter', () => clearTimeout(closeTimer));
							el.addEventListener('mouseleave', () => {
								closeTimer = setTimeout(() => circle.closePopup(), 300);
							});
						}
					});
				}
			}
		}

		loadPlaces().catch(err => {
			document.getElementById('loading').textContent = 'Failed to load places.';
			console.error(err);
		});
	</script>
</body>
</html>
