<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROE Episodes</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
	* { box-sizing: border-box; margin: 0; padding: 0; }
	body {
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
		background: #f5f5f5;
		color: #2c2c2c;
		line-height: 1.6;
	}
	.hero {
		position: relative;
		background: linear-gradient(135deg, #808080 0%, #a0a0a0 50%, #606060 100%);
		color: #fff;
		text-align: center;
		padding: 2.5rem 2rem;
	}
	.hero-image {
		width: 100%; height: 100%; object-fit: cover;
		position: absolute; top: 0; left: 0; opacity: 0.3;
	}
	.hero-content { position: relative; z-index: 1; }
	.hero h1 {
		font-size: 2rem;
		font-weight: 700;
		letter-spacing: -0.5px;
		text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
		margin-bottom: 0.25rem;
	}
	.hero h1 a { color: inherit; text-decoration: none; }
	.hero .tagline {
		font-size: 1.05rem;
		font-weight: 300;
		font-style: italic;
		opacity: 0.9;
		margin-bottom: 0.75rem;
	}
	.hero nav a {
		color: rgba(255,255,255,0.7);
		text-decoration: none;
		font-size: 0.9rem;
		transition: color 0.2s ease;
	}
	.hero nav a:hover { color: #fff; }
	.container {
		max-width: 800px;
		margin: 0 auto;
		padding: 2rem;
	}
	.status { color: #666; margin-bottom: 16px; font-size: 0.95rem; }
	.episode {
		background: #fff;
		border-radius: 12px;
		box-shadow: 0 2px 8px rgba(0,0,0,0.06);
		margin-bottom: 16px;
		padding: 20px;
	}
	.episode-title {
		font-weight: 600;
		font-size: 1.1rem;
		color: #404040;
		margin-bottom: 4px;
	}
	.episode-meta {
		color: #999;
		font-size: 0.85rem;
		margin-bottom: 10px;
	}
	.episode-summary {
		font-size: 0.95rem;
		line-height: 1.6;
		color: #4a4a4a;
		margin-bottom: 10px;
	}
	/* Episode body layout */
	.episode-body {
		display: flex;
		gap: 16px;
		align-items: flex-start;
	}
	.episode-text {
		flex: 1;
		min-width: 0;
	}
	/* Mini map */
	.episode-map-wrap {
		flex-shrink: 0;
		width: 200px;
	}
	.episode-mini-map {
		width: 200px;
		height: 200px;
		border-radius: 8px;
		border: 1px solid #e0e0e0;
	}
	.episode-mini-map .leaflet-control-zoom { display: none; }
	.map-places-label {
		font-size: 0.75rem;
		color: #999;
		text-align: center;
		margin-top: 4px;
	}

	/* Episode action buttons */
	.episode-actions {
		display: flex;
		gap: 6px;
		margin-top: 10px;
		flex-wrap: wrap;
	}
	.ep-btn {
		display: inline-flex;
		align-items: center;
		gap: 5px;
		background: #f7f7f7;
		border: none;
		border-radius: 8px;
		padding: 7px 14px;
		font-size: 0.8rem;
		font-weight: 500;
		color: #505050;
		cursor: pointer;
		transition: all 0.15s ease;
		text-decoration: none;
	}
	.ep-btn:hover { background: #ebebeb; color: #303030; }
	.ep-btn:active { transform: scale(0.97); }
	.ep-btn.playing { background: #fff3eb; color: #e85d04; }

	/* Player bar */
	.player-bar {
		position: fixed;
		bottom: 0;
		left: 0;
		right: 0;
		background: #303030;
		color: #fff;
		padding: 10px 16px;
		display: none;
		z-index: 1000;
	}
	.player-bar.active {
		display: block;
		animation: player-slide-up 0.4s ease forwards;
	}
	@keyframes player-slide-up {
		from { transform: translateY(100%); }
		to { transform: translateY(0); }
	}
	body:has(.player-bar.active) { padding-bottom: 80px; }
	.player-inner { max-width: 800px; margin: 0 auto; }
	.player-top {
		display: flex;
		align-items: center;
		gap: 10px;
		margin-bottom: 6px;
	}
	.player-title {
		flex: 1;
		font-size: 0.85rem;
		color: rgba(255,255,255,0.85);
		white-space: nowrap;
		overflow: hidden;
		text-overflow: ellipsis;
	}
	.spinning-coffee {
		font-size: 1.4rem;
		flex-shrink: 0;
		display: inline-block;
	}
	.player-bar.playing .spinning-coffee {
		animation: spin 2s linear infinite;
	}
	@keyframes spin {
		from { transform: rotate(0deg); }
		to { transform: rotate(360deg); }
	}
	.player-bottom {
		display: flex;
		align-items: center;
		gap: 8px;
	}
	.player-controls {
		display: flex;
		align-items: center;
		gap: 2px;
		flex-shrink: 0;
	}
	.player-controls button {
		background: none;
		border: none;
		color: #fff;
		font-size: 1rem;
		cursor: pointer;
		padding: 4px;
		border-radius: 50%;
		transition: all 0.15s ease;
		line-height: 1;
	}
	.player-controls button:hover { background: rgba(255,255,255,0.12); }
	.play-pause-btn {
		font-size: 1.3rem !important;
		width: 34px;
		height: 34px;
		display: flex !important;
		align-items: center;
		justify-content: center;
		background: rgba(255,255,255,0.08) !important;
	}
	.progress-container {
		flex: 1;
		height: 20px;
		cursor: pointer;
		position: relative;
		display: flex;
		align-items: center;
	}
	.progress-track {
		width: 100%;
		height: 4px;
		background: rgba(255,255,255,0.15);
		border-radius: 2px;
	}
	.progress-fill {
		height: 100%;
		background: linear-gradient(90deg, #FF4F00, #ff6b35, #ffd700);
		border-radius: 2px;
		width: 0%;
		transition: width 0.15s linear;
	}
	.player-time {
		font-size: 0.7rem;
		font-family: monospace;
		color: rgba(255,255,255,0.6);
		white-space: nowrap;
		flex-shrink: 0;
	}

	@media (max-width: 768px) {
		.hero { padding: 2rem 1.5rem; }
		.hero h1 { font-size: 1.6rem; }
		.container { padding: 1.5rem; }
		.episode-body { flex-direction: column; align-items: stretch; }
		.episode-map-wrap { width: 100%; }
		.episode-mini-map { width: 100%; height: 200px; }
	}
</style>
</head>
<body>

<div class="hero">
	<img class="hero-image" src="https://akiaiq6swxkqiixrwd6qcomhaystacksoftwarearq-us-west-1.s3.us-west-1.amazonaws.com/ferry_building.png" alt="" role="presentation">
	<div class="hero-content">
		<h1><a href="/">Roll Over Easy</a></h1>
		<div class="tagline">All Episodes</div>
		<nav><a href="/episodes">Episodes</a> · <a href="/map">Map</a> · <a href="/">Search</a></nav>
	</div>
</div>

<div class="container">
	<div id="status" class="status">Loading episodes...</div>
	<div id="episodes"></div>
</div>

<div id="player-bar" class="player-bar">
	<div class="player-inner">
		<div class="player-top">
			<span class="spinning-coffee">☕</span>
			<div class="player-title" id="player-title"></div>
		</div>
		<div class="player-bottom">
			<div class="player-controls">
				<button id="skip-back-btn" title="Back 15s">⏪</button>
				<button id="play-pause-btn" class="play-pause-btn" title="Play/Pause">▶️</button>
				<button id="skip-fwd-btn" title="Forward 15s">⏩</button>
			</div>
			<div class="progress-container" id="progress-container">
				<div class="progress-track">
					<div class="progress-fill" id="progress-fill"></div>
				</div>
			</div>
			<div class="player-time" id="player-time">0:00</div>
		</div>
	</div>
	<audio id="audio-player" preload="none"></audio>
</div>

<script>
const statusEl = document.getElementById('status');
const episodesEl = document.getElementById('episodes');

function formatDuration(ms) {
	if (!ms) return '';
	const totalSeconds = Math.floor(ms / 1000);
	const h = Math.floor(totalSeconds / 3600);
	const m = Math.floor((totalSeconds % 3600) / 60);
	if (h > 0) return h + 'h ' + m + 'm';
	return m + 'm';
}

function parseEpisodeDate(id) {
	// id format: roll-over-easy_YYYY-MM-DD_HH-MM-SS
	const match = id.match(/(\d{4}-\d{2}-\d{2})/);
	if (!match) return null;
	return match[1];
}

function formatDate(dateStr) {
	if (!dateStr) return '';
	const [y, m, d] = dateStr.split('-');
	const date = new Date(y, m - 1, d);
	return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

async function loadEpisodes() {
	try {
		const res = await fetch('/api/episodes');
		const data = await res.json();

		if (!data.episodes || data.episodes.length === 0) {
			statusEl.textContent = 'No episodes found.';
			return;
		}

		// Sort by date, newest first
		data.episodes.sort((a, b) => {
			const dateA = parseEpisodeDate(a.id) || '';
			const dateB = parseEpisodeDate(b.id) || '';
			return dateB.localeCompare(dateA);
		});

		statusEl.textContent = data.episodes.length + ' episode' + (data.episodes.length !== 1 ? 's' : '');

		for (let i = 0; i < data.episodes.length; i++) {
			const ep = data.episodes[i];
			const div = document.createElement('div');
			div.className = 'episode';

			const dateStr = parseEpisodeDate(ep.id);

			let html = '<div class="episode-title">' + escapeHtml(ep.title) + '</div>';
			html += '<div class="episode-meta">';
			if (dateStr) html += formatDate(dateStr);
			if (ep.duration_ms) html += (dateStr ? ' &middot; ' : '') + formatDuration(ep.duration_ms);
			html += '</div>';

			html += '<div class="episode-body">';
			html += '<div class="episode-text">';
			if (ep.summary) {
				html += '<div class="episode-summary">' + escapeHtml(ep.summary) + '</div>';
			}
			html += '<div class="episode-actions">';
			html += '<button class="ep-btn ep-play-btn" data-audio="/audio/' + encodeURIComponent(ep.id) + '.m4a" data-title="' + escapeAttr(ep.title) + '" data-start="0">&#9654; Play</button>';
			html += '<button class="ep-btn ep-skip-btn" data-audio="/audio/' + encodeURIComponent(ep.id) + '.m4a" data-title="' + escapeAttr(ep.title) + '" data-start="250">&#9193; Skip intro</button>';
			html += '<a class="ep-btn" href="/?q=&episode=' + encodeURIComponent(ep.id) + '">&#128269; Search</a>';
			html += '</div>';
			html += '</div>';

			if (ep.place_count > 0) {
				html += '<div class="episode-map-wrap">';
				html += '<div class="episode-mini-map" id="ep-map-' + i + '"></div>';
				html += '<div class="map-places-label" id="ep-map-label-' + i + '">' + ep.place_count + ' place' + (ep.place_count !== 1 ? 's' : '') + ' mentioned on this program</div>';
				html += '</div>';
			}

			html += '</div>';

			div.innerHTML = html;

			if (ep.place_count > 0) {
				const epId = ep.id;
				const container = div.querySelector('#ep-map-' + i);
				const label = div.querySelector('#ep-map-label-' + i);
				const observer = new IntersectionObserver((entries) => {
					entries.forEach(async (entry) => {
						if (entry.isIntersecting) {
							observer.unobserve(container);
							try {
								const res = await fetch('/api/episode/' + encodeURIComponent(epId) + '/places');
								const pdata = await res.json();
								if (pdata.places && pdata.places.length > 0) {
									initMiniMap(container, pdata.places);
									updateMapLabel(label, pdata.places);
								}
							} catch (err) {}
						}
					});
				}, { rootMargin: '200px' });
				observer.observe(container);
			}

			episodesEl.appendChild(div);
		}
	} catch (err) {
		statusEl.textContent = 'Error loading episodes: ' + err.message;
	}
}

function escapeHtml(str) {
	return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escapeAttr(str) {
	return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function updateMapLabel(label, places) {
	const n = places.length;
	const examples = places.slice(0, 3).map(p => '<strong>' + escapeHtml(p.name) + '</strong>');
	let text = n + ' place' + (n !== 1 ? 's' : '') + ' mentioned';
	if (examples.length === 1) {
		text += ' like ' + examples[0] + '.';
	} else if (examples.length === 2) {
		text += ' like ' + examples[0] + ' and ' + examples[1] + '.';
	} else {
		text += ' like ' + examples[0] + ', ' + examples[1] + ', and ' + examples[2] + '.';
	}
	label.innerHTML = text;
}

function initMiniMap(container, places) {
	const map = L.map(container, { scrollWheelZoom: false, zoomControl: false });
	L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
		attribution: '&copy; OSM &copy; CARTO',
		maxZoom: 19,
	}).addTo(map);

	const markers = places.map(p =>
		L.circleMarker([p.lat, p.lng], {
			radius: 7, fillColor: '#e85d04', color: '#e85d04',
			weight: 1, opacity: 0.8, fillOpacity: 0.7,
		}).bindTooltip(p.name).addTo(map)
	);

	if (places.length === 1) {
		map.setView([places[0].lat, places[0].lng], 15);
	} else {
		const group = L.featureGroup(markers);
		map.fitBounds(group.getBounds().pad(0.15));
	}
}

// Player
const playerBar = document.getElementById('player-bar');
const playerTitle = document.getElementById('player-title');
const audioPlayer = document.getElementById('audio-player');
const progressFill = document.getElementById('progress-fill');
const progressContainer = document.getElementById('progress-container');
const timeDisplay = document.getElementById('player-time');
const playPauseBtn = document.getElementById('play-pause-btn');
let currentAudioSrc = '';
let pendingSeek = 0;
let activeBtn = null;

function formatTime(seconds) {
	const h = Math.floor(seconds / 3600);
	const m = Math.floor((seconds % 3600) / 60);
	const s = Math.floor(seconds % 60);
	if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
	return m + ':' + String(s).padStart(2, '0');
}

function playEpisode(audioUrl, startSeconds, title) {
	playerBar.classList.add('active');
	playerTitle.textContent = title;

	if (currentAudioSrc !== audioUrl) {
		currentAudioSrc = audioUrl;
		pendingSeek = startSeconds;
		audioPlayer.src = audioUrl;
		audioPlayer.load();
		audioPlayer.play().catch(() => {});
	} else {
		audioPlayer.currentTime = startSeconds;
		audioPlayer.play().catch(() => {});
	}
}

audioPlayer.addEventListener('loadedmetadata', () => {
	if (pendingSeek > 0) {
		audioPlayer.currentTime = pendingSeek;
		pendingSeek = 0;
	}
});

audioPlayer.addEventListener('timeupdate', () => {
	if (!audioPlayer.duration) return;
	const pct = (audioPlayer.currentTime / audioPlayer.duration) * 100;
	progressFill.style.width = pct + '%';
	timeDisplay.textContent = formatTime(audioPlayer.currentTime) + ' / ' + formatTime(audioPlayer.duration);
});

audioPlayer.addEventListener('play', () => {
	playerBar.classList.add('playing');
	playPauseBtn.textContent = '\u23F8\uFE0F';
});

audioPlayer.addEventListener('pause', () => {
	playerBar.classList.remove('playing');
	playPauseBtn.textContent = '\u25B6\uFE0F';
});

audioPlayer.addEventListener('ended', () => {
	playerBar.classList.remove('playing');
	playPauseBtn.textContent = '\u25B6\uFE0F';
});

playPauseBtn.addEventListener('click', () => {
	if (audioPlayer.paused) audioPlayer.play().catch(() => {});
	else audioPlayer.pause();
});

document.getElementById('skip-back-btn').addEventListener('click', () => {
	audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 15);
});

document.getElementById('skip-fwd-btn').addEventListener('click', () => {
	audioPlayer.currentTime = Math.min(audioPlayer.duration || 0, audioPlayer.currentTime + 15);
});

progressContainer.addEventListener('click', (e) => {
	if (!audioPlayer.duration) return;
	const rect = progressContainer.getBoundingClientRect();
	const pct = (e.clientX - rect.left) / rect.width;
	audioPlayer.currentTime = pct * audioPlayer.duration;
});

// Delegate clicks on play/skip buttons
episodesEl.addEventListener('click', (e) => {
	const btn = e.target.closest('.ep-btn');
	if (!btn) return;
	const audioUrl = btn.dataset.audio;
	const title = btn.dataset.title;
	const start = parseInt(btn.dataset.start, 10);

	if (activeBtn) activeBtn.classList.remove('playing');
	const playBtn = btn.closest('.episode-actions').querySelector('.ep-play-btn');
	playBtn.classList.add('playing');
	activeBtn = playBtn;

	playEpisode(audioUrl, start, title);
});

loadEpisodes();
</script>

</body>
</html>
