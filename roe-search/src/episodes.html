<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROE Episodes</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
<style>
	* { box-sizing: border-box; margin: 0; padding: 0; }
	body {
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
		background: #f5f5f5;
		color: #2c2c2c;
		line-height: 1.6;
	}
	.hero {
		background: linear-gradient(135deg, #808080 0%, #a0a0a0 50%, #606060 100%);
		color: #fff;
		text-align: center;
		padding: 2.5rem 2rem;
	}
	.hero h1 {
		font-size: 2rem;
		font-weight: 700;
		letter-spacing: -0.5px;
		text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
		margin-bottom: 0.25rem;
	}
	.hero .tagline {
		font-size: 1.05rem;
		font-weight: 300;
		font-style: italic;
		opacity: 0.9;
		margin-bottom: 0.75rem;
	}
	.hero nav a {
		color: rgba(255,255,255,0.7);
		text-decoration: none;
		font-size: 0.9rem;
		transition: color 0.2s ease;
	}
	.hero nav a:hover { color: #fff; }
	.container {
		max-width: 800px;
		margin: 0 auto;
		padding: 2rem;
	}
	.status { color: #666; margin-bottom: 16px; font-size: 0.95rem; }
	.episode {
		background: #fff;
		border-radius: 12px;
		box-shadow: 0 2px 8px rgba(0,0,0,0.06);
		margin-bottom: 16px;
		padding: 20px;
	}
	.episode-title {
		font-weight: 600;
		font-size: 1.1rem;
		color: #404040;
		margin-bottom: 4px;
	}
	.episode-meta {
		color: #999;
		font-size: 0.85rem;
		margin-bottom: 10px;
	}
	.episode-summary {
		font-size: 0.95rem;
		line-height: 1.6;
		color: #4a4a4a;
		margin-bottom: 10px;
	}
	.episode-link {
		font-size: 0.9rem;
	}
	.episode-link a {
		color: #505050;
		text-decoration: none;
		border-bottom: 1px solid transparent;
		transition: all 0.2s ease;
	}
	.episode-link a:hover {
		color: #303030;
		border-bottom-color: #505050;
	}

	@media (max-width: 768px) {
		.hero { padding: 2rem 1.5rem; }
		.hero h1 { font-size: 1.6rem; }
		.container { padding: 1.5rem; }
	}
</style>
</head>
<body>

<div class="hero">
	<h1>Roll Over Easy</h1>
	<div class="tagline">All Episodes</div>
	<nav><a href="/">Search</a> &middot; <a href="/guests">Guests</a></nav>
</div>

<div class="container">
	<div id="status" class="status">Loading episodes...</div>
	<div id="episodes"></div>
</div>

<script>
const statusEl = document.getElementById('status');
const episodesEl = document.getElementById('episodes');

function formatDuration(ms) {
	if (!ms) return '';
	const totalSeconds = Math.floor(ms / 1000);
	const h = Math.floor(totalSeconds / 3600);
	const m = Math.floor((totalSeconds % 3600) / 60);
	if (h > 0) return h + 'h ' + m + 'm';
	return m + 'm';
}

function parseEpisodeDate(id) {
	// id format: roll-over-easy_YYYY-MM-DD_HH-MM-SS
	const match = id.match(/(\d{4}-\d{2}-\d{2})/);
	if (!match) return null;
	return match[1];
}

function formatDate(dateStr) {
	if (!dateStr) return '';
	const [y, m, d] = dateStr.split('-');
	const date = new Date(y, m - 1, d);
	return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

async function loadEpisodes() {
	try {
		const res = await fetch('/api/episodes');
		const data = await res.json();

		if (!data.episodes || data.episodes.length === 0) {
			statusEl.textContent = 'No episodes found.';
			return;
		}

		// Sort by date, newest first
		data.episodes.sort((a, b) => {
			const dateA = parseEpisodeDate(a.id) || '';
			const dateB = parseEpisodeDate(b.id) || '';
			return dateB.localeCompare(dateA);
		});

		statusEl.textContent = data.episodes.length + ' episode' + (data.episodes.length !== 1 ? 's' : '');

		for (const ep of data.episodes) {
			const div = document.createElement('div');
			div.className = 'episode';

			const dateStr = parseEpisodeDate(ep.id);

			let html = '<div class="episode-title">' + escapeHtml(ep.title) + '</div>';
			html += '<div class="episode-meta">';
			if (dateStr) html += formatDate(dateStr);
			if (ep.duration_ms) html += (dateStr ? ' &middot; ' : '') + formatDuration(ep.duration_ms);
			html += '</div>';

			if (ep.summary) {
				html += '<div class="episode-summary">' + escapeHtml(ep.summary) + '</div>';
			}

			html += '<div class="episode-link"><a href="/?q=&episode=' + encodeURIComponent(ep.id) + '">Search this episode</a></div>';

			div.innerHTML = html;
			episodesEl.appendChild(div);
		}
	} catch (err) {
		statusEl.textContent = 'Error loading episodes: ' + err.message;
	}
}

function escapeHtml(str) {
	return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

loadEpisodes();
</script>

</body>
</html>
